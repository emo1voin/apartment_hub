<!DOCTYPE html>
<html>
<head>
    <title>Test Booking Form</title>
</head>
<body>
    <h1>Test Booking Form</h1>
    <form action="http://localhost/example-app/public/bookings" method="POST">
        <input type="hidden" name="_token" value="test-token">
        <input type="hidden" name="room_id" value="1">
        
        <label>Check In:</label>
        <input type="date" name="check_in" value="2026-04-25" required><br><br>
        
        <label>Check Out:</label>
        <input type="date" name="check_out" value="2026-04-27" required><br><br>
        
        <label>Adults:</label>
        <input type="number" name="adults" value="2" required><br><br>
        
        <label>Children:</label>
        <input type="number" name="children" value="0"><br><br>
        
        <button type="submit">Submit Test Booking</button>
    </form>
    
    <hr>
    <p>This form should POST to http://localhost/example-app/public/bookings route</p>
    <p>Check logs after submitting: Get-Content storage/logs/laravel.log | Select-Object -Last 10</p>
</body>
</html>
